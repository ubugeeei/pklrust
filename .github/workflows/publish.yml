name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Publish in dependency order: pklrs-derive -> pklrs -> pklrs-codegen
      - name: Publish pklrs-derive
        run: cargo publish -p pklrs-derive

      - name: Wait for pklrs-derive to be available
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "pklrs-derive") | .version')
          until curl -sf "https://crates.io/api/v1/crates/pklrs-derive/$VERSION" > /dev/null; do
            echo "Waiting for pklrs-derive $VERSION on crates.io..."
            sleep 5
          done

      - name: Publish pklrs
        run: cargo publish -p pklrs

      - name: Wait for pklrs to be available
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "pklrs") | .version')
          until curl -sf "https://crates.io/api/v1/crates/pklrs/$VERSION" > /dev/null; do
            echo "Waiting for pklrs $VERSION on crates.io..."
            sleep 5
          done

      - name: Publish pklrs-codegen
        run: cargo publish -p pklrs-codegen

name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Publish in dependency order: pklrust-derive -> pklrust -> pklrust-codegen
      - name: Get OIDC token for pklrust-derive
        id: oidc-derive
        run: |
          OIDC_RESPONSE=$(curl -sLS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=crates.io" -H "User-Agent: actions/oidc-client" -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN")
          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value')
          if [ "$OIDC_TOKEN" = "null" ] || [ -z "$OIDC_TOKEN" ]; then
            echo "::error::Failed to get OIDC token: $OIDC_RESPONSE"
            exit 1
          fi
          EXCHANGE_RESPONSE=$(curl -sLS 'https://crates.io/api/v1/trusted_publishing/tokens' -H 'Content-Type: application/json' -d "{\"oidc_token\": \"$OIDC_TOKEN\"}")
          CRATES_IO_TOKEN=$(echo "$EXCHANGE_RESPONSE" | jq -r '.token')
          if [ "$CRATES_IO_TOKEN" = "null" ] || [ -z "$CRATES_IO_TOKEN" ]; then
            echo "::error::Failed to exchange OIDC token: $EXCHANGE_RESPONSE"
            exit 1
          fi
          echo "::add-mask::$CRATES_IO_TOKEN"
          echo "token=$CRATES_IO_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Publish pklrust-derive
        run: cargo publish -p pklrust-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.oidc-derive.outputs.token }}

      - name: Wait for pklrust-derive to be available
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "pklrust-derive") | .version')
          until curl -sf "https://crates.io/api/v1/crates/pklrust-derive/$VERSION" > /dev/null; do
            echo "Waiting for pklrust-derive $VERSION on crates.io..."
            sleep 5
          done

      - name: Get OIDC token for pklrust
        id: oidc-pklrust
        run: |
          OIDC_RESPONSE=$(curl -sLS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=crates.io" -H "User-Agent: actions/oidc-client" -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN")
          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value')
          if [ "$OIDC_TOKEN" = "null" ] || [ -z "$OIDC_TOKEN" ]; then
            echo "::error::Failed to get OIDC token: $OIDC_RESPONSE"
            exit 1
          fi
          EXCHANGE_RESPONSE=$(curl -sLS 'https://crates.io/api/v1/trusted_publishing/tokens' -H 'Content-Type: application/json' -d "{\"oidc_token\": \"$OIDC_TOKEN\"}")
          CRATES_IO_TOKEN=$(echo "$EXCHANGE_RESPONSE" | jq -r '.token')
          if [ "$CRATES_IO_TOKEN" = "null" ] || [ -z "$CRATES_IO_TOKEN" ]; then
            echo "::error::Failed to exchange OIDC token: $EXCHANGE_RESPONSE"
            exit 1
          fi
          echo "::add-mask::$CRATES_IO_TOKEN"
          echo "token=$CRATES_IO_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Publish pklrust
        run: cargo publish -p pklrust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.oidc-pklrust.outputs.token }}

      - name: Wait for pklrust to be available
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "pklrust") | .version')
          until curl -sf "https://crates.io/api/v1/crates/pklrust/$VERSION" > /dev/null; do
            echo "Waiting for pklrust $VERSION on crates.io..."
            sleep 5
          done

      - name: Get OIDC token for pklrust-codegen
        id: oidc-codegen
        run: |
          OIDC_RESPONSE=$(curl -sLS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=crates.io" -H "User-Agent: actions/oidc-client" -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN")
          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value')
          if [ "$OIDC_TOKEN" = "null" ] || [ -z "$OIDC_TOKEN" ]; then
            echo "::error::Failed to get OIDC token: $OIDC_RESPONSE"
            exit 1
          fi
          EXCHANGE_RESPONSE=$(curl -sLS 'https://crates.io/api/v1/trusted_publishing/tokens' -H 'Content-Type: application/json' -d "{\"oidc_token\": \"$OIDC_TOKEN\"}")
          CRATES_IO_TOKEN=$(echo "$EXCHANGE_RESPONSE" | jq -r '.token')
          if [ "$CRATES_IO_TOKEN" = "null" ] || [ -z "$CRATES_IO_TOKEN" ]; then
            echo "::error::Failed to exchange OIDC token: $EXCHANGE_RESPONSE"
            exit 1
          fi
          echo "::add-mask::$CRATES_IO_TOKEN"
          echo "token=$CRATES_IO_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Publish pklrust-codegen
        run: cargo publish -p pklrust-codegen
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.oidc-codegen.outputs.token }}
